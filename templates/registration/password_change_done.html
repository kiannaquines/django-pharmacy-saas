{% extends "base.html" %}

{% block title %}Password Changed · Pharmacy SaaS{% endblock %}

{% block content %}
<div class="relative min-h-screen w-full flex justify-center items-center py-16 md:py-10">
    <div class="card md:w-lg w-screen z-10">
        <div class="text-center px-10 py-12">
            <a href="/" class="flex justify-center mb-8">
                <span class="text-xl font-bold text-primary">Pharmacy SaaS</span>
