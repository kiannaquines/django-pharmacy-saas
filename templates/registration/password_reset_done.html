{% extends "base.html" %}
{% load static %}

{% block title %}Reset Link Sent · Pharmacy SaaS{% endblock %}

{% block content %}
<div class="relative min-h-screen w-full flex justify-center items-center py-16 md:py-10">
  <div class="card md:w-lg w-screen z-10">
    <div class="text-center px-10 py-12">
      <a href="/" class="flex justify-center mb-8">
        <span class="text-xl font-bold text-primary">Pharmacy SaaS</span>
      </a>

      <div class="flex justify-center mb-6">
        <img src="{% static 'assets/auth-email-BFIbkqjB.png' %}" alt="Email sent" class="h-24" />
      </div>

      <h4 class="mb-2.5 text-xl font-semibold text-default-900">Check Your Email</h4>
      <p class="text-base text-default-500 mb-8">
        If an account exists for that email, we've sent password reset instructions.
      </p>

      <a href="{% url 'login' %}" class="btn bg-primary text-white w-full">Back to Sign In</a>
    </div>
  </div>
</div>
{% endblock %}
