{% extends "base.html" %}

{% block title %}Reset link sent · Pharmacy SaaS{% endblock %}

{% block content %}
  <div class="min-h-screen bg-slate-50">
    <div class="mx-auto flex max-w-6xl justify-center px-4 py-12">
      <div class="w-full max-w-md rounded-lg border border-slate-200 bg-white p-6">
        <h1 class="text-xl font-semibold text-slate-900">Check your email</h1>
        <p class="mt-1 text-sm text-slate-600">If an account exists for that email, we’ve sent a reset link.</p>
        <div class="mt-6">
          <a class="inline-flex items-center rounded-md bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-800"
             href="{% url 'login' %}">
            Back to login
          </a>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
