{% with current_view=request.resolver_match.view_name %}
  <div class="p-4">
    <div class="text-xs font-semibold uppercase tracking-wide text-slate-500">Navigation</div>
    <ul class="mt-3 space-y-1 text-sm">
      <li>
        <a class="flex items-center gap-3 rounded-md px-3 py-2 font-medium {% if current_view == 'dashboard' %}bg-slate-100 text-slate-900{% else %}text-slate-700 hover:bg-slate-50 hover:text-slate-900{% endif %}"
           href="{% url 'dashboard' %}">
          <svg aria-hidden="true" class="h-5 w-5 text-slate-400 {% if current_view == 'dashboard' %}text-slate-700{% endif %}" viewBox="0 0 20 20" fill="currentColor">
            <path d="M10.707 1.707a1 1 0 0 0-1.414 0l-7 7A1 1 0 0 0 3 10.414V18a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1v-5h2v5a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1v-7.586a1 1 0 0 0 .293-.707 1 1 0 0 0-.293-.707l-7-7Z" />
          </svg>
          <span>Dashboard</span>
        </a>
      </li>
      <li>
        <a class="flex items-center gap-3 rounded-md px-3 py-2 font-medium {% if current_view|slice:':6' == 'admin:' %}bg-slate-100 text-slate-900{% else %}text-slate-700 hover:bg-slate-50 hover:text-slate-900{% endif %}"
           href="{% url 'admin:index' %}">
          <svg aria-hidden="true" class="h-5 w-5 text-slate-400 {% if current_view|slice:':6' == 'admin:' %}text-slate-700{% endif %}" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M8 7a1 1 0 0 1 1-1h2a1 1 0 1 1 0 2H9a1 1 0 0 1-1-1Zm-3 3a1 1 0 0 1 1-1h8a1 1 0 1 1 0 2H6a1 1 0 0 1-1-1Zm1 2a1 1 0 0 0-1 1v4a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2v-4a1 1 0 1 0-2 0v4H7v-4a1 1 0 0 0-1-1ZM4 3a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v2a1 1 0 1 1-2 0V3H6v2a1 1 0 1 1-2 0V3Z" clip-rule="evenodd" />
          </svg>
          <span>Admin</span>
        </a>
      </li>
      <li>
        <a class="flex items-center gap-3 rounded-md px-3 py-2 font-medium {% if current_view == 'password_change' %}bg-slate-100 text-slate-900{% else %}text-slate-700 hover:bg-slate-50 hover:text-slate-900{% endif %}"
           href="{% url 'password_change' %}">
          <svg aria-hidden="true" class="h-5 w-5 text-slate-400 {% if current_view == 'password_change' %}text-slate-700{% endif %}" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 2a4 4 0 0 0-4 4v1H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-1V6a4 4 0 0 0-4-4Zm2 5V6a2 2 0 1 0-4 0v1h4Z" clip-rule="evenodd" />
          </svg>
          <span>Change password</span>
        </a>
      </li>
    </ul>
  </div>
{% endwith %}
