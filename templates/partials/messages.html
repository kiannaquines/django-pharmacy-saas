{% if messages %}
  <div class="mx-auto max-w-6xl px-4 pt-4">
    {% for message in messages %}
      <div class="mb-3 rounded-md border border-slate-200 bg-white px-4 py-3 text-sm text-slate-800">
        <div class="flex items-start justify-between gap-4">
          <div>
            {% if message.tags %}
              <span class="mr-2 inline-flex items-center rounded-full bg-slate-100 px-2 py-0.5 text-xs font-medium text-slate-700">
                {{ message.tags|title }}
              </span>
            {% endif %}
            {{ message }}
          </div>
        </div>
      </div>
    {% endfor %}
  </div>
{% endif %}
