<header class="sticky top-0 z-30 border-b border-slate-200 bg-white/90 backdrop-blur">
  <div class="mx-auto flex max-w-6xl items-center justify-between gap-4 px-4 py-3">
    <div class="flex items-center gap-3">
      <button class="lg:hidden rounded-md p-2 text-slate-600 hover:bg-slate-100 hover:text-slate-900"
              type="button"
              data-sidebar-open
              aria-label="Open sidebar">
        <svg aria-hidden="true" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M2 4.75A.75.75 0 0 1 2.75 4h14.5a.75.75 0 0 1 0 1.5H2.75A.75.75 0 0 1 2 4.75Zm0 5.25A.75.75 0 0 1 2.75 9.25h14.5a.75.75 0 0 1 0 1.5H2.75A.75.75 0 0 1 2 10Zm0 5.25a.75.75 0 0 1 .75-.75h14.5a.75.75 0 0 1 0 1.5H2.75a.75.75 0 0 1-.75-.75Z" clip-rule="evenodd" />
        </svg>
      </button>

      <a class="flex items-center gap-2 text-sm font-semibold text-slate-900" href="{% url 'dashboard' %}">
        <span class="inline-flex h-8 w-8 items-center justify-center rounded-lg bg-slate-900 text-white">P</span>
        <span class="hidden sm:inline">Pharmacy SaaS</span>
      </a>
    </div>

    <div class="hidden md:flex flex-1 justify-center">
      <div class="relative w-full max-w-md">
        <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
          <svg aria-hidden="true" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 1 0 3.447 9.787l2.633 2.633a.75.75 0 1 0 1.06-1.06l-2.633-2.633A5.5 5.5 0 0 0 9 3.5Zm-4 5.5a4 4 0 1 1 8 0 4 4 0 0 1-8 0Z" clip-rule="evenodd" />
          </svg>
        </div>
        <input class="w-full rounded-md border border-slate-200 bg-white py-2 pl-9 pr-3 text-sm text-slate-900 placeholder:text-slate-400 focus:border-slate-300 focus:outline-none focus:ring-2 focus:ring-slate-200"
               type="search"
               placeholder="Search…"
               aria-label="Search" />
      </div>
    </div>

    <nav class="flex items-center gap-3 text-sm">
      {% if request.user.is_authenticated %}
        <details class="relative">
          <summary class="list-none cursor-pointer rounded-full border border-slate-200 bg-white px-3 py-1.5 font-medium text-slate-900 hover:bg-slate-50">
            {{ request.user.get_username }}
          </summary>
          <div class="absolute right-0 mt-2 w-56 overflow-hidden rounded-md border border-slate-200 bg-white shadow-lg">
            <a class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50" href="{% url 'admin:index' %}">Admin</a>
            <a class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50" href="{% url 'password_change' %}">Change password</a>
            <div class="border-t border-slate-200"></div>
            <form method="post" action="{% url 'logout' %}">
              {% csrf_token %}
              <button class="w-full px-4 py-2 text-left text-sm font-medium text-slate-900 hover:bg-slate-50" type="submit">
                Log out
              </button>
            </form>
          </div>
        </details>
      {% else %}
        <a class="rounded-md bg-slate-900 px-3 py-1.5 text-sm font-medium text-white hover:bg-slate-800"
           href="{% url 'login' %}">
          Log in
        </a>
      {% endif %}
    </nav>
  </div>
</header>
